<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Tesla Model 3</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;}
video{width:100%;max-height:100vh;object-fit:contain;}
</style></head>
<body>
<video controls autoplay loop muted playsinline webkit-playsinline x5-playsinline x5-video-player-type="h5">
<source src="tesla_model3.mp4" type="video/mp4">
</video>
<script>
document.addEventListener('DOMContentLoaded', function(){
  var v = document.querySelector('video');
  v.play().catch(function(){});
  document.body.addEventListener('touchstart', function(){
    v.play().catch(function(){});
  }, {once: true});
});
</script>
</body></html>
